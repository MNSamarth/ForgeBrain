spring:
  application:
    name: forgebrain-backend
  profiles:
    active: local

server:
  port: ${PORT:8080}

# ---------------------------------------------------------------------------
# ForgeBrain application configuration.
#
# This section defines STRUCTURE only. No real project IDs, bucket names, or
# credentials belong here or in any profile-specific file in this repository —
# see docs/CONFIGURATION.md Section 5. Real values are supplied via environment
# variables or Google Secret Manager at deploy time, never committed.
# ---------------------------------------------------------------------------
forgebrain:
  application:
    environment: local
    pipeline-version: "1.0.0"
    enabled-stages: []
  vertex-ai:
    project-id: ""
    location: "us-central1"
    research-model: "gemini-2.0-flash-001"
    lesson-model: "gemini-2.0-pro-001"
    script-model: "gemini-2.0-pro-001"
    content-director-model: "gemini-2.0-flash-001"
    lesson-temperature: 0.4
    lesson-max-output-tokens: 2048
    lesson-response-mime-type: "application/json"
    content-director-temperature: 0.4
    content-director-max-output-tokens: 2048
    content-director-response-mime-type: "application/json"
    script-temperature: 0.4
    script-max-output-tokens: 2048
    script-response-mime-type: "application/json"
  ai-gateway:
    max-retries: 2
    initial-backoff-millis: 250
    backoff-multiplier: 2.0
    timeout-millis: 30000
    cache-enabled: true
  cloud-storage:
    enabled: false
    media-bucket: ""
    assets-bucket: ""
    temp-bucket: ""
    output-prefix: "reels"
    project-id: ""
  firestore:
    project-id: ""
    database-id: "(default)"
    collection-prefix: "forgebrain"
  cloud-scheduler:
    job-name: ""
    cron-expression: "0 0 * * *"
    timezone: "UTC"
  cloud-run:
    service-name: "forgebrain-backend"
    region: "us-central1"
    max-concurrency: 10
  local-storage:
    curriculum-roadmap-path: "../curriculum/java-roadmap.json"
    memory-state-path: "data/memory-state.json"
    pipeline-output-directory: "data/output"
    execution-report-directory: "reports"
  rendering:
    ffmpeg-path: "ffmpeg"
    ffprobe-path: "ffprobe"
    output-directory: "data/renders"
    voiceover-assets-directory: "data/assets/voiceover"
    assets-directory: "../assets"
  pipeline:
    run-on-startup: false
  reel-export:
    run-on-startup: false
  jobs:
    jobs-directory: "data/jobs"
    output-storage-root: "data/job-output"
    run-on-startup: false
  reviewer:
    approval-threshold: 0.7
    dimension-floor: 0.5
    duration-mismatch-tolerance-seconds: 3.0
    script-length-tolerance-ratio: 1.25
    max-subtitle-reading-chars-per-second: 20.0
    dimension-weights:
      technical-accuracy: 0.25
      pacing-fit: 0.15
      hook-strength: 0.15
      educational-clarity: 0.15
      production-polish: 0.1
      brand-consistency: 0.05
      visual-readability: 0.05
      subtitle-quality: 0.05
      retention-potential: 0.05
    reviewer-version: "1.0.0"
    scoring-version: "1.0.0"
  publishing:
    publishing-version: "1.0.0"
    default-hashtags: ["#java", "#coding", "#shorts"]
    default-category: "Education"
    default-language-code: "en-US"
    title-max-length: 100
    description-max-length: 2000
    upload:
      dry-run-only: true
      youtube:
        enabled: false
        client-id: ""
        client-secret: ""
        refresh-token: ""
        channel-id: ""
        privacy-status: "private"
        category-id: "27"
      instagram:
        enabled: false
        access-token: ""
        ig-user-id: ""
        publish-poll-interval-seconds: 5
        publish-poll-max-attempts: 10
  analytics:
    snapshots-directory: "data/analytics/snapshots"
    reports-directory: "data/analytics/reports"
    snapshot-version: "1.0.0"
    performance-score-smoothing: 0.5
    trend-significance-threshold: 0.05
    revision-priority-high-threshold: 0.6
    strong-performer-approval-rate-threshold: 0.8
    cooldown-days-on-rejection: 14
